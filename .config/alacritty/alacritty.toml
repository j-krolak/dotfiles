
[font]
size=10.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window.padding]
x = 5
y = 5

[window]
opacity=1

[cursor.style]
blinking = "always"

[general]
import = [
        "~/.config/alacritty/tokyonight.toml"
]

[env]
TERM = "xterm-256color"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
