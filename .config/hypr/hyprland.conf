source = ~/.config/hypr/settings.conf

debug {
    suppress_errors = true
}
# Identify the window and strip its "window" features
windowrulev2 = float, class:^(showmethekey-gtk)$
windowrulev2 = pin, class:^(showmethekey-gtk)$
windowrulev2 = move 40% 5%, class:^(showmethekey-gtk)$ # Position it at the top
windowrulev2 = size 20% 5%, class:^(showmethekey-gtk)$ # Make it a small bar
windowrulev2 = noborder, class:^(showmethekey-gtk)$
windowrulev2 = noshadow, class:^(showmethekey-gtk)$
windowrulev2 = noblur, class:^(showmethekey-gtk)$
windowrulev2 = opacity 0.8 override 0.5 override, class:^(showmethekey-gtk)$ # Transparency
# monitor settings
monitor=$monitorA,1920x1080@60,0x0,1
monitor=$monitorB,preferred@highrr,auto,1

# Turn off the screen after lid closes
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"

# Turn on the screen after lid opens
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1920x1080@60, 0x0, 1"

# startup programs
exec-once = hyprpaper
exec-once = hypridle
exec-once = waybar
exec-once = systemctl --user start hyprpolkitagent
exec-once = dunst
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
exec-once = swayosd-server
exec-once = source ~/.zshrc
exec-once=XDG_MENU_PREFIX=arch- kbuildsycoca6
exec-once=sway-audio-idle-inhibit

# environment variables
env = GTK_THEME,Fluent-Dark
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_DEBUG,portals
env = QT_QPA_PLATFORMTHEME,qt5ct
env = HYPRCURSOR_THEME, Adwaita
env = HYPRCURSOR_SIZE, 24
env = XDG_MENU_PREFIX,plasma-

input {
    kb_layout = pl
    kb_variant = ,programmer
    kb_model =
    kb_options =
    kb_rules =

    accel_profile = adaptive   

    follow_mouse = 1
    mouse_refocus = false

    touchpad {
			natural_scroll = true
    	scroll_factor=0.2
    	disable_while_typing = false
    	middle_button_emulation = false
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in = 0
    gaps_out = 0 
    border_size = 0
    layout = dwindle
    allow_tearing = false
}

decoration {
    inactive_opacity = 1
		blur {
	    enabled = true
    	new_optimizations = on
    	ignore_opacity = off
    }
}



animations {
    enabled = true
    bezier = custom,0.13, 1, 0.75,1

    animation = windows, 1, 3, custom, popin
    animation = windowsOut, 1, 3, custom, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 3, default
    animation = windowsMove, 1, 2.5, custom, slide
    animation = fadeShadow, 1, 10, custom
}

cursor {
	inactive_timeout = 3
    no_hardware_cursors = 0
}

dwindle {
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

ecosystem {
    no_update_news = true
}

misc {
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
    disable_splash_rendering = true
		disable_hyprland_logo = true
		disable_splash_rendering = true
}

# window rules
windowrulev2 = center, floating:[1] TouchpadTouchpad
windowrulev2 = float,class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float,title:^(Picture-in-Picture)$

# force to treat Digital as a tile
windowrulev2 = tile,class:^(de-neemann-digital-gui-Main)$

# workspaces
workspace = 1, monitor:$monitorA, default:true, persistent:true
workspace = 2, monitor:$monitorA, default:true, persistent:true
workspace = 3, monitor:$monitorA, default:true, persistent:true
workspace = 4, monitor:$monitorA, default:true, persistent:true
workspace = 5, monitor:$monitorA, default:true, persistent:true
workspace = 6, monitor:$monitorB, default:true, persistent:true
workspace = 7, monitor:$monitorB, default:true, persistent:true
workspace = 8, monitor:$monitorB, default:true, Touchpadpersistent:true

# magnifier
bind = $modC, EQUAL, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 + 0.5}')    
bind = $modC, MINUS, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 - 0.5}')    
bind = $modC, 0, exec, hyprctl keyword cursor:zoom_factor 1    

# color picker
bind = $modC, p, exec, hyprpicker -a

bind = $modA, 1, movetoworkspacesilent, 1
bind = $modA, 2, movetoworkspacesilent, 2
bind = $modA, 3, movetoworkspacesilent, 3
bind = $modA, 4, movetoworkspacesilent, 4
bind = $modA, 5, movetoworkspacesilent, 5

bind = $modB, 1, movetoworkspacesilent, 1
bind = $modB, 2, movetoworkspacesilent, 3
bind = $modB, 3, movetoworkspacesilent, 5
bind = $modB, 4, movetoworkspacesilent, 7

# moving between workspaces
bind = $modC, 1, workspace, 1
bind = $modC, 2, workspace, 2
bind = $modC, 3, workspace, 3
bind = $modC, 4, workspace, 4
bind = $modC, 5, workspace, 5

bind = $modC, 6, workspace, 6
bind = $modC, 7, workspace, 7
bind = $modC, 8, workspace, 8

# virtual desktops
bind = $modB, O, exec, ~/.local/bin/switch_desktops.sh 1
bind = $modB, I, exec, ~/.local/bin/switch_desktops.sh -1
bind = $modA, O, exec, ~/.local/bin/switch_desktops.sh 1
bind = $modA, I, exec, ~/.local/bin/switch_desktops.sh -1
bind = $modA, BACKSLASH, swapactiveworkspaces, $monitorA $monitorB
bind = $modB, BACKSLASH, swapactiveworkspaces, $monitorA $monitorB 

# lock
bind = $modA, L, exec, pidof hyprlock || hyprlock

bind = $modB, T, exec, alacritty
bind = $modC, T, exec, alacritty
bind = $modC, Z, exec, zen-browser 
bind = $modC, V, exec, code
bind = $modC, D, exec, dolphin
bind = $modC, S, exec, spotify
bind = Alt, Q, killactive,
bind = Alt, F4, killactive,


bind = Alt, V, togglefloating,
bind = Alt, Y, togglesplit
binde = $modA, K, resizeactive, 40 0
binde = $modA, J, resizeactive, -40 0
binde = $modB, K, resizeactive, 40 0
binde = $modB, J, resizeactive, -40 0



# rofi
bind = Alt, W, exec, ~/.local/bin/launch_rofi.sh -show drun -show-icons

# reload waybar
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh


# powermenu
bind = $altControl,DELETE, exec, ~/.local/bin/powermenu.sh
bind = Alt, 1, movewindow, mon:0
bind = Alt, 2, movewindow, mon:1
bind = Alt, O, exec, hyprctl dispatch focusmonitor $monitorA && hyprctl dispatch focusmonitor $monitorB
bind = Alt, I, exec, hyprctl dispatch focusmonitor $monitorB && hyprctl dispatch focusmonitor $monitorA

# media control
bind = $modA, P, exec, playerctl --player=spotify play-pause
bind = $modA, E, exec, playerctl --player=spotify previous
bind = $modA, R, exec, playerctl --player=spotify next
bind = $modB, P, exec, playerctl --player=spotify play-pause
bind = $modB, E, exec, playerctl --player=spotify previous
bind = $modB, R, exec,  playerctl --player=spotify next

# window rules
#windowrule=float,title:^(Picture-in-Picture)$
windowrulev2 = opacity 0.0 override, class:^(xwaylandvideobridge)$
windowrulev2 = noanim, class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus, class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1, class:^(xwaylandvideobridge)$
windowrulev2 = noblur, class:^(xwaylandvideobridge)$
windowrulev2 = nofocus, class:^(xwaylandvideobridge)$

# Float the Sioyek Helper window (Portal)
# Replace 'sioyek_helper' with the actual title you found in Step 2 if it's different.
# If the title is dynamic/changing, we can rely on the fact that it is NOT the main window.

# Option A: Exact match (Best if title is constant)
windowrulev2 = float,class:^(sioyek)$,title:^(sioyek)$
windowrulev2 = pin,class:^(sioyek)$,title:^(sioyek)$
windowrulev2 = size 40% 35%,class:^(sioyek)$,title:^(sioyek)$
windowrulev2 = move 100%-w-20 20,class:^(sioyek)$,title:^(sioyek)$


# audio control
binde=, XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde=, XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind=,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind=,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
binde=,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde=,XF86MonBrightnessDown, exec, swayosd-client --brightness lower


# screenshots
bind = SUPER_SHIFT, S, exec, grimblast --freeze copy area

# move focus between windows
bind = Alt, H, movefocus, l
bind = Alt, L, movefocus, r
bind = Alt, K, movefocus, u
bind = Alt, J, movefocus, d

# move and resize windows via mouse
bindm = Alt, mouse:272, movewindow
bindm = Alt, mouse:273, resizewindow

# control volume with functional keys
bind = ,XF86AudioLowerVolume, exec, pactl -- set-sink-volume 0 -10%
bind = ,XF86AudioRaiseVolume, exec, pactl -- set-sink-volume 0 +10%
bind = ,XF86AudioMute, exec, pactl -- set-sink-mute 0 toggle
bind = ,XF86AudioMicMute, exec, pactl -- set-source-mute 0 toggle

# control brightness with function keys (brightnessctl required)
bind = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind = ,XF86MonBrightnessUp, exec, brightnessctl s +10%

# screenshot
bind = $modB, T, exec, alacritty
bind = Alt, S, exec, grim -g "$(slurp)" - | wl-copy

# Start recording a region to ~/Videos with timestamp
bind = SUPER, R, exec, wf-recorder -g "$(slurp)" -f ~/Videos/recording_$(date +"%Y-%m-%d_%H-%M-%S").mp4

# Stop recording (kill the process)
bind = SUPER SHIFT, R, exec, killall -SIGINT wf-recorder

# OCR Selection to Clipboard (Text Only)
bind = $mainMod, o, exec, grim -g "$(slurp)" - | tesseract - - -l eng | wl-copy
bind = $mainMod, f, fullscreen, 0


bind = SUPER, Q, exec, echo "you have similar task and solution solve the new task" | wl-copy
